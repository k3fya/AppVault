<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data: https:;"
  >
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quick Launch</title>
  <link rel="stylesheet" href="ql-styles.css">
</head>
<body>
  <div class="wrap">
    <div class="search-row">
      <input id="q" placeholder="Search..." autocomplete="off" />
      <div id="dragHandle" class="drag-handle">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <circle cx="20" cy="8" r="1" transform="rotate(-180 20 8)" stroke="#bababa" stroke-width="2"></circle> <circle cx="20" cy="16" r="1" transform="rotate(-180 20 16)" stroke="#bababa" stroke-width="2"></circle> <circle cx="12" cy="8" r="1" transform="rotate(-180 12 8)" stroke="#bababa" stroke-width="2"></circle> <circle cx="12" cy="16" r="1" transform="rotate(-180 12 16)" stroke="#bababa" stroke-width="2"></circle> <circle cx="4" cy="8" r="1" transform="rotate(-180 4 8)" stroke="#bababa" stroke-width="2"></circle> <circle cx="4" cy="16" r="1" transform="rotate(-180 4 16)" stroke="#bababa" stroke-width="2"></circle> </g>
        </svg>
      </div>
    </div>
    <div id="quickInfo" class="quick-info" aria-hidden="false"></div>

    <ul id="list" class="list" role="list"></ul>
  </div>

  <script src="ql-script.js"></script>
</body>
</html>
