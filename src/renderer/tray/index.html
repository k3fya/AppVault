<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AppVault Tray</title>
  <link rel="stylesheet" href="tray-styles.css">
</head>
<body>
  <div id="tray-container">
    <div class="section-header" data-i18n="frequentHeader"></div>
    <div id="shortcuts-list"></div>

    <div class="section-header" data-i18n="controls"></div>
    <button id="show-app" data-i18n="showApp"></button>
    <button id="hide-app" data-i18n="hideApp"></button>
    <hr>
    <button id="restart" data-i18n="restartBtn"></button>
    <button id="quit" data-i18n="quit"></button>
  </div>

  <script src="tray-script.js"></script>
</body>
</html>
